services:
  - type: web
    name: beautyagent-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: USE_LLM_DRAFTING
        value: false
      - key: ANTHROPIC_MODEL_SONNET
        value: anthropic/claude-sonnet-4-5
      - key: ANTHROPIC_MODEL_HAIKU
        value: anthropic/claude-haiku-4-5-20251001
      - key: OPENROUTER_MODEL
        value: poolside/laguna-m.1:free
      - key: LLM_TIMEOUT_SECONDS
        value: 15
      - key: LLM_MAX_TOKENS
        value: 1000
      - key: CHANNEL_TIMEOUT_SECONDS
        value: 20
      - key: FRONTEND_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
